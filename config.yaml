# ── Model Configuration ──
models:
  fast: "gemini-2.0-flash"
  pro: "gemini-2.5-pro"
  embedding: "gemini-embedding-001"

# ── Budget ──
budget:
  max_dollars: 410.0
  warn_at_dollars: 350.0

# ── Chunking ──
chunking:
  chunk_size: 512        # tokens (approx words)
  chunk_overlap: 64
  min_chunk_size: 50

# ── Retrieval ──
retrieval:
  bm25_top_k: 20
  vector_top_k: 20
  hybrid_top_k: 10
  rrf_k: 60              # RRF constant

# ── RLM Controller ──
rlm:
  max_depth: 4
  confidence_threshold: 0.5      # Was 0.7 — lowered so recursion actually triggers
  max_sub_questions: 3
  max_chunks_per_step: 10         # Was 5 — match RAG baseline
  initial_chunks: 10              # Top-level retrieval count
  sub_question_chunks: 5          # Sub-question retrieval count
  max_steps: 8
  history_chars: 5000

# ── Baselines ──
fullcontext:
  max_input_tokens: 900000    # Gemini 2.0 Flash context

rag:
  top_k: 10

mapreduce:
  map_chunk_count: 10
  reduce_max_tokens: 4096

# ── Benchmarks ──
benchmarks:
  needle_haystack:
    haystack_lengths: [1000, 5000, 10000, 25000, 50000, 100000]
    needle_positions: [0.0, 0.1, 0.25, 0.5, 0.75, 0.9, 1.0]
    num_samples: 5
    distractor_count: 0
  needle_haystack_stress:
    haystack_lengths: [10000, 50000, 100000, 250000]
    needle_positions: [0.1, 0.5, 0.9]
    num_samples: 3
    distractor_count: 6
    distractor_repeat_factor: 1
    confusion_block_repeats: 0
  needle_haystack_challenging:
    haystack_lengths: [100000, 250000, 500000]
    needle_positions: [0.1, 0.5, 0.9]
    num_samples: 3
    distractor_count: 6
    distractor_repeat_factor: 4
    confusion_block_repeats: 6
  multihop:
    num_samples: 15
    hops: [2, 3]
    doc_lengths: [10000, 50000, 100000, 500000]
  longbench:
    datasets: ["qasper", "narrativeqa"]
    max_samples: 50
  musique:
    num_samples: 10
    hops: [2, 3, 4]
    doc_lengths: [10000, 50000, 100000]
    methods: ["rag", "rlm"]

# ── Experiment ──
experiment:
  seed: 42
  methods: ["fullcontext", "rag", "mapreduce", "rlm"]
  output_dir: "results"
